<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>亞德醫材｜數位保固卡查詢</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;600;700&display=swap" rel="stylesheet" />

<style>
:root{
  --brand:#70B24D; --ink:#212121; --muted:#6b7280;
  --bg:#f7f8f9; --card:#fff; --shadow:0 6px 14px rgba(0,0,0,.04);
  --error-bg:#fef2f2; --error-border:#f5c2c2; --error-text:#8a1f1f;
  --info-bg:#eff6ff; --info-border:#bfdbfe; --info-text:#1e3a8a;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:"Noto Sans TC",-apple-system,"PingFang TC","Microsoft JhengHei",Arial,sans-serif;line-height:1.25}
h1,h2,h3,h4,h5,h6,p,ul,ol,dl,figure,blockquote,pre{margin:0}
.header{background:#fff;border-bottom:5px solid var(--brand)}
.nav{max-width:1080px;margin:0 auto;display:flex;align-items:center;gap:8px;padding:8px 10px}
.nav img{height:38px;width:auto}
.nav .title{font-weight:800;color:var(--brand)}
.wrap{max-width:1080px;margin:0 auto;padding:8px}
.panel{background:var(--card);border-radius:12px;box-shadow:var(--shadow);padding:8px;margin:6px 0}
.row{display:flex;flex-direction:column;gap:6px}
.field label{display:block;font-size:13px;color:var(--muted);margin:0 0 2px 6px;line-height:1.2}
.input{width:100%;padding:10px 12px;border:1px solid #e5e7eb;border-radius:10px;font-size:16px;line-height:1.1}
.btn{width:100%;padding:12px 14px;border:none;border-radius:10px;background:var(--brand);color:#fff;font-size:16px;font-weight:900;cursor:pointer;margin-top:8px}
.btn:active{transform:translateY(1px)}
.btn[disabled]{opacity:.6;cursor:not-allowed}
.grid{display:grid;grid-template-columns:1fr;gap:8px}
.card{display:grid;grid-template-columns:68px 1fr;gap:8px;align-items:center;background:#fff;border-radius:12px;box-shadow:var(--shadow);padding:8px}
.product-thumb{width:68px;height:68px;border-radius:8px;border:1px solid #eee;object-fit:cover;background:#fafafa}
.kv{display:flex;gap:6px;flex-wrap:wrap;margin:0 0 2px}
.badge{display:inline-flex;align-items:center;font-size:12px;font-weight:800;padding:2px 8px;border-radius:999px}
.badge.ok{background:#eaf7ea;color:#1c5d19;border:1px solid #c9e6c7}
.badge.soon{background:#fff6e6;color:#8a5300;border:1px solid #ffe0a6}
.badge.expired{background:#fcebec;color:#8a1f1f;border:1px solid #f5c2c2}
.meta{font-size:14px;line-height:1.45;margin:2px 0}
.meta b{color:#111}
.codepill{background:#eef2f7;border:1px solid #e3e8ef;color:#3b4a5a;border-radius:10px;padding:4px 8px;font-weight:900}
.toggle{margin-top:6px;background:none;border:none;color:var(--brand);font-size:14px;font-weight:800;cursor:pointer;padding:0;display:inline-flex;align-items:center;gap:4px}
.toggle .arrow{transition:transform .2s ease}
.card.open .toggle .arrow{transform:rotate(180deg)}
.details{display:none;border-top:1px dashed #e5e7eb;margin-top:4px;padding-top:6px;color:#444;line-height:1.5;font-size:13px;white-space:pre-wrap}
.card.open .details{display:block}

.alert{background:var(--error-bg);border:1px solid var(--error-border);color:var(--error-text);padding:10px 14px;border-radius:10px;font-size:14px;font-weight:700;text-align:center}
.notice{background:var(--info-bg);border:1px solid var(--info-border);color:var(--info-text);padding:10px 14px;border-radius:10px;font-size:13px;font-weight:700}
.small{font-size:12px;color:var(--muted);margin-top:6px;text-align:center}

@media (min-width:768px){
  .row{flex-direction:row;align-items:flex-end;gap:10px}
  .btn{width:auto}
  .wrap{padding:14px}
  .panel{padding:10px;margin:8px 0}
  .grid{gap:10px}
  .card{grid-template-columns:88px 1fr;padding:10px}
  .product-thumb{width:88px;height:88px}
}
</style>
</head>

<body>
<header class="header">
  <div class="nav">
    <img src="https://raw.githubusercontent.com/uryard7737-sketch/LOGO/main/%E4%BA%9E%E5%BE%B7%E9%86%AB%E6%9D%90%201000x500-07.png" alt="亞德醫材 Logo">
    <div class="title">數位保固卡查詢</div>
  </div>
</header>

<main class="wrap">
  <section class="panel">
    <div class="row">
      <div class="field" style="flex:1 1 220px">
        <label for="phone">手機後四碼</label>
        <input id="phone" class="input" maxlength="4" inputmode="numeric" placeholder="例如：1688" />
      </div>
      <div class="field" style="flex:1 1 220px">
        <label for="fullname">姓名（全名）</label>
        <input id="fullname" class="input" placeholder="例如：王小明" />
      </div>
      <button id="btn" class="btn" type="button">查詢</button>
    </div>

    <div id="runtimeNotice" class="small"></div>
  </section>

  <div id="result" class="grid" aria-live="polite"></div>
</main>

<script>
/** ✅ 你的保固 API **/
const API_URL   = "https://script.google.com/macros/s/AKfycbyg6WCxrKmduqdR6IimD865ugcSjrXvbpNLIb5v-hkeCmJZX-uvs-NbMpIXUBDULTnIVg/exec";
const API_TOKEN = "Uryardwarranty_ALL";

/** 讓「就算 JS 爆炸」也會在頁面顯示錯誤 */
(function setupHardErrorUI(){
  const show = (msg) => {
    const box = document.getElementById("result");
    if (!box) return;
    box.innerHTML = `<div class="alert">⚠️ 前端程式發生錯誤：<br>${escapeHtml(String(msg))}<br><br>請按 Ctrl+F5 重新整理，若仍出現請把 Console 紅字截圖給我。</div>`;
  };
  window.addEventListener("error", (e) => show(e.message || e.error || "unknown error"));
  window.addEventListener("unhandledrejection", (e) => show(e.reason || "promise rejection"));
})();

function escapeHtml(s){
  return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function parseTWDateToISO(s){
  // 支援 yyyy/MM/dd 或 yyyy-MM-dd
  if (!s) return "";
  const t = String(s).trim();
  const m1 = t.match(/^(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})$/);
  if (!m1) return "";
  const y = Number(m1[1]), mo = Number(m1[2]), d = Number(m1[3]);
  if (!y || !mo || !d) return "";
  return `${y}-${String(mo).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
}

function statusBadge(until){
  // until: yyyy/MM/dd
  const iso = parseTWDateToISO(until);
  const exp = iso ? new Date(iso + "T23:59:59") : new Date(NaN);
  const now = new Date();
  const days = (exp - now) / 86400000;

  if (isNaN(exp.getTime())) return ["—","ok"];
  if (exp < now) return ["已過保","expired"];
  if (days <= 30) return ["即將到期","soon"];
  return ["保固內","ok"];
}

function setLoading(isLoading){
  const btn = document.getElementById("btn");
  if (!btn) return;
  btn.disabled = isLoading;
  btn.textContent = isLoading ? "查詢中…" : "查詢";
}

function render(list, versionText){
  const box = document.getElementById("result");
  box.innerHTML = "";

  const notice = document.getElementById("runtimeNotice");
  if (notice) notice.textContent = versionText ? `API 版本：${versionText}` : "";

  if(!Array.isArray(list) || list.length === 0){
    box.innerHTML = `<div class="alert">❌ 查無符合的保固紀錄，請確認輸入是否正確或聯絡客服。</div>`;
    return;
  }

  list.forEach(r=>{
    const [label,cls] = statusBadge(r.WarrantyUntil);
    const detailsText = (r.WarrantyText || "").trim() || "本產品保固條款請依原廠為準。";
    const img = (r.ProductImageURL || r.ImageURL || "").trim() || "https://dummyimage.com/200x200/eeeeee/000000&text=Product";

    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
      <img class="product-thumb" src="${img}" alt="product"
           onerror="this.onerror=null;this.src='https://dummyimage.com/200x200/eeeeee/000000&text=Product';">
      <div>
        <div class="kv">
          <span class="codepill">${escapeHtml(String(r.Model||""))}</span>
          <span class="badge ${cls}">${label}</span>
        </div>
        <div class="meta"><b>${escapeHtml(String((r.Brand||"") + " " + (r.ProductName||"")).trim())}</b></div>
        <div class="meta">📅 保固到期：<b>${escapeHtml(String(r.WarrantyUntil||"-"))}</b></div>
        <div class="meta">📅 購買日期：${escapeHtml(String(r.PurchaseDate||"-"))}</div>
        <div class="meta">姓名：${escapeHtml(String(r.FullName||"-"))} ｜ 手機：${escapeHtml(String(r.Phone||"-"))}</div>

        <button class="toggle" type="button"><span class="arrow">⌄</span> 保固內容說明</button>
        <div class="details">${escapeHtml(detailsText)}</div>

        <div class="meta">門市：${escapeHtml(String(r.Shop||"-"))}</div>
        <div class="meta">備註：${escapeHtml(String(r.Notes||"-"))} ｜ 紀錄ID：${escapeHtml(String(r.RecordID||"-"))}</div>
      </div>
    `;
    box.appendChild(card);
  });

  document.querySelectorAll(".toggle").forEach(btn=>{
    btn.addEventListener("click", ()=> btn.closest(".card").classList.toggle("open"));
  });
}

async function doSearch(){
  const phone = document.getElementById("phone").value.trim();
  const name  = document.getElementById("fullname").value.trim();

  if (phone.length !== 4 || !name){
    render([], "");
    return;
  }

  setLoading(true);

  try{
    // cache bust，避免被瀏覽器/中繼層快取舊資料
    const qs = `token=${encodeURIComponent(API_TOKEN)}&phoneLast4=${encodeURIComponent(phone)}&fullName=${encodeURIComponent(name)}&t=${Date.now()}`;
    const url = `${API_URL}?${qs}`;

    const resp = await fetch(url, { method: "GET" });
    const data = await resp.json();

    if (data && data.ok){
      render(data.rows || [], data.version || "");
    } else {
      render([], (data && data.version) ? data.version : "");
    }
  }catch(e){
    // 這裡會顯示在頁面上（不用看 console）
    throw e;
  }finally{
    setLoading(false);
  }
}

document.getElementById("btn").addEventListener("click", doSearch);
document.getElementById("phone").addEventListener("keydown", (e)=>{ if(e.key==="Enter") doSearch(); });
document.getElementById("fullname").addEventListener("keydown", (e)=>{ if(e.key==="Enter") doSearch(); });
</script>

</body>
</html>
