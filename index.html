<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>亞德醫材｜數位保固卡查詢</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;600;700&display=swap" rel="stylesheet" />

<style>
:root{
  --brand:#70B24D;
  --ink:#212121;
  --muted:#6b7280;
  --bg:#f7f8f9;
  --card:#fff;
  --shadow:0 6px 14px rgba(0,0,0,.04);
}

*{box-sizing:border-box}
body{
  margin:0;
  font-family:"Noto Sans TC",sans-serif;
  background:var(--bg);
  color:var(--ink);
}

.header{
  background:#fff;
  border-bottom:5px solid var(--brand);
}

.nav{
  max-width:1080px;
  margin:auto;
  display:flex;
  align-items:center;
  gap:10px;
  padding:10px;
}

.nav img{height:38px}
.title{color:var(--brand);font-weight:700}

.wrap{
  max-width:1080px;
  margin:auto;
  padding:12px;
}

.panel{
  background:#fff;
  border-radius:12px;
  padding:12px;
  box-shadow:var(--shadow);
}

.row{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.input{
  padding:10px;
  border:1px solid #ddd;
  border-radius:10px;
  font-size:16px;
  width:200px;
}

.btn{
  background:var(--brand);
  color:#fff;
  border:none;
  border-radius:10px;
  padding:10px 16px;
  font-size:16px;
  font-weight:700;
  cursor:pointer;
}

.grid{
  margin-top:16px;
  display:grid;
  gap:10px;
}

.card{
  display:grid;
  grid-template-columns:80px 1fr;
  gap:10px;
  background:#fff;
  border-radius:12px;
  padding:10px;
  box-shadow:var(--shadow);
}

.product-thumb{
  width:80px;
  height:80px;
  border-radius:10px;
  object-fit:cover;
  border:1px solid #eee;
}

.codepill{
  background:#eef2f7;
  padding:4px 8px;
  border-radius:8px;
  font-weight:700;
  font-size:13px;
}

.badge{
  padding:3px 8px;
  border-radius:999px;
  font-size:12px;
  font-weight:700;
}

.badge.ok{
  background:#eaf7ea;
  color:#1c5d19;
}

.badge.soon{
  background:#fff6e6;
  color:#8a5300;
}

.badge.expired{
  background:#fcebec;
  color:#8a1f1f;
}

.meta{
  font-size:14px;
  margin-top:3px;
}

.progress{
  height:8px;
  background:#e5e7eb;
  border-radius:999px;
  overflow:hidden;
  margin-top:6px;
}

.progress-bar{
  height:100%;
  background:var(--brand);
}

.toggle{
  margin-top:6px;
  border:none;
  background:none;
  color:var(--brand);
  font-weight:700;
  cursor:pointer;
}

.details{
  display:none;
  font-size:13px;
  margin-top:6px;
  border-top:1px dashed #ddd;
  padding-top:6px;
}

.card.open .details{
  display:block;
}

.action-btn{
  margin-top:8px;
  display:inline-block;
  padding:6px 10px;
  border-radius:8px;
  font-size:13px;
  text-decoration:none;
  font-weight:700;
}

.btn-line{
  background:#06c755;
  color:#fff;
}

.btn-product{
  background:#eef2f7;
  color:#111;
}
</style>
</head>

<body>

<header class="header">
<div class="nav">
<img src="https://raw.githubusercontent.com/uryard7737-sketch/LOGO/main/%E4%BA%9E%E5%BE%B7%E9%86%AB%E6%9D%90%201000x500-07.png">
<div class="title">數位保固卡查詢</div>
</div>
</header>

<main class="wrap">

<div class="panel">
<div class="row">

<input id="phone" class="input" placeholder="手機後四碼">
<input id="name" class="input" placeholder="姓名">

<button id="btn" class="btn">查詢</button>

</div>
</div>

<div id="result" class="grid"></div>

</main>

<script>

const API_URL="https://script.google.com/macros/s/AKfycbyg6WCxrKmduqdR6IimD865ugcSjrXvbpNLIb5v-hkeCmJZX-uvs-NbMpIXUBDULTnIVg/exec";
const TOKEN="Uryardwarranty_ALL";

function statusBadge(until){

const exp=new Date(until)
const now=new Date()

const days=(exp-now)/86400000

if(exp<now) return ["已過保","expired"]
if(days<30) return ["即將到期","soon"]

return ["保固內","ok"]

}

function daysLeft(until){

const exp=new Date(until)
const now=new Date()

return Math.ceil((exp-now)/86400000)

}

function render(list){

const box=document.getElementById("result")
box.innerHTML=""

if(!list.length){
box.innerHTML="查無資料"
return
}

list.forEach(r=>{

const [label,cls]=statusBadge(r.WarrantyUntil)

const dleft=daysLeft(r.WarrantyUntil)

const img=r.ImageURL||"https://dummyimage.com/200x200/eeeeee/000000&text=Product"

const card=document.createElement("div")
card.className="card"

card.innerHTML=`

<img class="product-thumb"
src="${img}"
onerror="this.src='https://dummyimage.com/200x200/eeeeee/000000&text=No+Image'">

<div>

<div>
<span class="codepill">${r.Model||""}</span>
<span class="badge ${cls}">${label}</span>
</div>

<div class="meta"><b>${r.Brand||""} ${r.ProductName||""}</b></div>

<div class="meta">保固到期：${r.WarrantyUntil||""}（剩 ${dleft} 天）</div>

<div class="meta">購買日期：${r.PurchaseDate||""}</div>

<div class="progress">
<div class="progress-bar" style="width:${100-dleft/365*100}%"></div>
</div>

<a class="action-btn btn-line" target="_blank"
href="https://line.me/R/ti/p/@linda520910">
LINE客服
</a>

<button class="toggle">保固內容說明</button>

<div class="details">
${r.WarrantyText||"依原廠保固條款"}
</div>

<div class="meta">門市：${r.Shop||""}</div>

<div class="meta">紀錄ID：${r.RecordID||""}</div>

</div>
`

box.appendChild(card)

})

document.querySelectorAll(".toggle").forEach(btn=>{
btn.onclick=()=>{
btn.closest(".card").classList.toggle("open")
}
})

}

document.getElementById("btn").onclick=async()=>{

const phone=document.getElementById("phone").value
const name=document.getElementById("name").value

if(!phone||!name) return

document.getElementById("result").innerHTML="查詢中..."

const url=\`\${API_URL}?token=\${TOKEN}&phoneLast4=\${phone}&fullName=\${encodeURIComponent(name)}\`

const res=await fetch(url)

const data=await res.json()

if(data.ok) render(data.rows)
else render([])

}

</script>

</body>
</html>
