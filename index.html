<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>亞德醫材｜數位保固卡查詢</title>

  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

  <style>
    :root{
      --brand:#70B24D;
      --ink:#111827;
      --muted:#6b7280;
      --bg:#f6f7f9;
      --card:#ffffff;
      --border:#e5e7eb;
      --shadow:0 10px 22px rgba(0,0,0,.06);
      --shadow2:0 6px 14px rgba(0,0,0,.05);

      --ok-bg:#eaf7ea;   --ok-tx:#1c5d19; --ok-bd:#c9e6c7;
      --soon-bg:#fff6e6; --soon-tx:#8a5300; --soon-bd:#ffe0a6;
      --exp-bg:#fcebec;  --exp-tx:#8a1f1f; --exp-bd:#f5c2c2;
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0}
    body{
      background:var(--bg);
      color:var(--ink);
      font-family:"Noto Sans TC",-apple-system,BlinkMacSystemFont,"PingFang TC","Microsoft JhengHei",Arial,sans-serif;
      line-height:1.35;
    }

    .header{background:#fff;border-bottom:5px solid var(--brand)}
    .nav{max-width:1080px;margin:0 auto;display:flex;align-items:center;gap:10px;padding:10px 12px}
    .nav img{height:38px;width:auto}
    .nav .title{font-weight:900;color:var(--brand);letter-spacing:.4px}

    .wrap{max-width:1080px;margin:0 auto;padding:12px}
    .panel{
      background:var(--card);
      border-radius:16px;
      box-shadow:var(--shadow);
      padding:12px;
      margin:10px 0;
    }

    .row{display:flex;flex-direction:column;gap:10px}
    .field label{display:block;font-size:13px;color:var(--muted);margin:0 0 4px 6px}
    .input{
      width:100%;
      padding:11px 12px;
      border:1px solid var(--border);
      border-radius:12px;
      font-size:16px;
      outline:none;
      background:#fff;
    }
    .input:focus{border-color:rgba(112,178,77,.6);box-shadow:0 0 0 4px rgba(112,178,77,.14)}
    .btn{
      width:100%;
      padding:12px 14px;
      border:none;
      border-radius:12px;
      background:var(--brand);
      color:#fff;
      font-size:16px;
      font-weight:900;
      cursor:pointer;
      box-shadow:var(--shadow2);
    }
    .btn[disabled]{opacity:.6;cursor:not-allowed}
    .hint{font-size:12px;color:var(--muted);margin-top:8px}

    .grid{display:grid;grid-template-columns:1fr;gap:14px;margin-top:10px}

    .alert{
      background:#fff;
      border:1px solid #f5c2c2;
      color:#8a1f1f;
      padding:12px 14px;border-radius:16px;
      font-size:14px;font-weight:900;text-align:center;
      box-shadow:var(--shadow);
    }
    .notice{
      background:#fff;
      border:1px solid #bfdbfe;
      color:#1e3a8a;
      padding:10px 12px;border-radius:14px;
      font-size:13px;font-weight:800;
      box-shadow:var(--shadow2);
    }

    .card{
      background:#fff;border-radius:18px;
      box-shadow:var(--shadow);
      overflow:hidden;
      border:1px solid rgba(0,0,0,.04);
      position:relative;
    }
    .card-top{display:flex;gap:12px;padding:12px;align-items:flex-start}
    .thumb{
      width:110px;height:110px;flex:0 0 auto;
      border-radius:14px;border:1px solid #eee;
      object-fit:cover;background:#fafafa;
    }
    .main{flex:1 1 auto;min-width:0}
    .topline{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:4px}
    .codepill{
      display:inline-flex;align-items:center;
      background:#eef2f7;border:1px solid #e3e8ef;color:#334155;
      border-radius:999px;padding:4px 10px;font-weight:900;font-size:13px;
    }
    .badge{
      display:inline-flex;align-items:center;
      font-size:12px;font-weight:900;padding:3px 10px;border-radius:999px;
      border:1px solid transparent;
    }
    .badge.ok{background:var(--ok-bg);color:var(--ok-tx);border-color:var(--ok-bd)}
    .badge.soon{background:var(--soon-bg);color:var(--soon-tx);border-color:var(--soon-bd)}
    .badge.expired{background:var(--exp-bg);color:var(--exp-tx);border-color:var(--exp-bd)}
    .brandname{font-size:15px;font-weight:900;color:#111;margin:2px 0 6px}
    .meta{font-size:13px;color:#111;margin:3px 0}
    .meta span{color:var(--muted)}
    .small{font-size:12px;color:var(--muted)}

    .barwrap{margin-top:10px}
    .barlabel{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--muted);margin-bottom:6px}
    .bar{width:100%;height:10px;background:#eef2f7;border-radius:999px;overflow:hidden;border:1px solid #e5e7eb}
    .bar > i{display:block;height:100%;width:0%}
    .bar.ok > i{background:rgba(112,178,77,.95)}
    .bar.soon > i{background:rgba(245,158,11,.95)}
    .bar.expired > i{background:rgba(239,68,68,.95)}

    .card-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
    .chipbtn{
      appearance:none;border:1px solid var(--border);background:#fff;
      border-radius:999px;padding:7px 10px;
      font-size:13px;font-weight:900;color:#111;
      cursor:pointer;
    }
    .chipbtn.primary{border-color:rgba(112,178,77,.55);color:var(--brand)}
    .chipbtn:active{transform:translateY(1px)}
    .chipbtn[disabled]{opacity:.55;cursor:not-allowed}

    .toggle{
      margin-top:8px;
      display:inline-flex;align-items:center;gap:6px;
      background:none;border:none;padding:0;
      color:var(--brand);
      font-weight:900;cursor:pointer;font-size:13px;
    }
    .toggle .arrow{transition:transform .2s ease}
    .card.open .toggle .arrow{transform:rotate(180deg)}
    .details{
      display:none;
      padding:0 12px 12px 12px;
      border-top:1px dashed #e5e7eb;
      color:#374151;
      white-space:pre-wrap;
      font-size:13px;
    }
    .card.open .details{display:block}

    /* 右上角截圖按鈕 */
    .shot{
      position:absolute; top:10px; right:10px;
      border:none; cursor:pointer;
      background:#111827; color:#fff;
      font-weight:900; font-size:12px;
      padding:8px 10px; border-radius:999px;
      box-shadow:var(--shadow2);
    }
    .shot[disabled]{opacity:.6;cursor:not-allowed}

    /* 右下角浮動客服 */
    .fab{
      position:fixed; right:16px; bottom:16px;
      display:flex; flex-direction:column; gap:10px;
      z-index:9999;
    }
    .fab a{
      display:inline-flex; align-items:center; gap:8px;
      padding:12px 14px;
      border-radius:999px;
      background:var(--brand);
      color:#fff; text-decoration:none;
      font-weight:900;
      box-shadow:var(--shadow);
    }
    .fab a.secondary{background:#111827}

    @media (min-width:900px){
      .wrap{padding:16px}
      .row{flex-direction:row;align-items:flex-end}
      .btn{width:auto}
    }
  </style>
</head>

<body>
<header class="header">
  <div class="nav">
    <img src="https://raw.githubusercontent.com/uryard7737-sketch/LOGO/main/%E4%BA%9E%E5%BE%B7%E9%86%AB%E6%9D%90%201000x500-07.png" alt="亞德醫材 Logo">
    <div class="title">數位保固卡查詢</div>
  </div>
</header>

<main class="wrap">
  <section class="panel">
    <div class="row">
      <div class="field" style="flex:1 1 220px">
        <label for="phone">手機後四碼（選填）</label>
        <input id="phone" class="input" maxlength="4" inputmode="numeric" placeholder="例如：1688" />
      </div>

      <div class="field" style="flex:1 1 260px">
        <label for="fullname">姓名（全名／選填）</label>
        <input id="fullname" class="input" placeholder="例如：王小明" />
      </div>

      <div class="field" style="flex:1 1 280px">
        <label for="serial">序號 SerialNo（可直接用序號查）</label>
        <input id="serial" class="input" placeholder="例如：SN123456" />
      </div>

      <button id="btn" class="btn" type="button">查詢</button>
    </div>

    <div class="hint" id="apiHint">API 版本：—</div>
  </section>

  <div id="result" class="grid" aria-live="polite"></div>
</main>

<!-- 右下角固定客服 -->
<div class="fab">
  <a id="lineFab" href="#" target="_blank" rel="noopener">LINE 客服</a>
  <a class="secondary" href="https://www.uryard.com.tw/" target="_blank" rel="noopener">前往官網</a>
</div>

<script>
/** ✅ 你的保固 API **/
const API_URL   = "https://script.google.com/macros/s/AKfycbyg6WCxrKmduqdR6IimD865ugcSjrXvbpNLIb5v-hkeCmJZX-uvs-NbMpIXUBDULTnIVg/exec";
const API_TOKEN = "Uryardwarranty_ALL";

/** ✅ 你們 LINE 客服（改成你真正的 LINE@ 連結） */
const LINE_URL  = "https://line.me/R/ti/p/@uryard"; // ← 改成你們LINE@
document.getElementById("lineFab").href = LINE_URL;

function esc(s){
  return String(s ?? "")
    .replaceAll("&","&amp;").replaceAll("<","&lt;")
    .replaceAll(">","&gt;").replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

function parseDateLoose(s){
  if(!s) return null;
  const t = String(s).trim().replaceAll("-","/");
  const m = t.match(/^(\d{4})\/(\d{1,2})\/(\d{1,2})$/);
  if(m) return new Date(Number(m[1]), Number(m[2])-1, Number(m[3]));
  const d = new Date(t);
  return isNaN(d.getTime()) ? null : d;
}

function badgeByUntil(until){
  const exp = parseDateLoose(until);
  const now = new Date();
  if(!exp) return {label:"—", cls:"ok", daysLeft:null};
  const daysLeft = Math.ceil((exp.getTime() - now.getTime()) / 86400000);
  if(daysLeft < 0) return {label:"已過保", cls:"expired", daysLeft};
  if(daysLeft <= 30) return {label:"即將到期", cls:"soon", daysLeft};
  return {label:"保固內", cls:"ok", daysLeft};
}

function pctFromDaysLeft(daysLeft){
  // 視覺用：用 365 天當滿格（簡單好懂）
  const MAX = 365;
  if(daysLeft === null) return 0;
  if(daysLeft <= 0) return 0;
  if(daysLeft >= MAX) return 100;
  return Math.round((daysLeft / MAX) * 100);
}

function pickImageUrl(r){
  const url = (r.ProductImageURL || r.ImageURL || "").toString().trim();
  return url;
}

function showAlert(msg){
  document.getElementById("result").innerHTML = `<div class="alert">${msg}</div>`;
}

async function downloadCardPng(cardEl, filename){
  const canvas = await html2canvas(cardEl, { backgroundColor:"#ffffff", scale:2, useCORS:true });
  const a = document.createElement("a");
  a.href = canvas.toDataURL("image/png");
  a.download = filename;
  a.click();
}

function render(rows){
  const box = document.getElementById("result");
  box.innerHTML = "";

  if(!rows || !rows.length){
    showAlert("❌ 查無符合的保固紀錄，請確認輸入是否正確或聯絡客服。");
    return;
  }

  rows.forEach((r, idx) => {
    const badge = badgeByUntil(r.WarrantyUntil);
    const pct = pctFromDaysLeft(badge.daysLeft);

    const placeholder = "https://dummyimage.com/400x400/eeeeee/000000&text=Product";
    const imgUrl = pickImageUrl(r) || placeholder;

    const model = esc(r.Model || "-");
    const brand = esc(r.Brand || "");
    const pname = esc(r.ProductName || "");
    const serial = esc(r.SerialNo || "");
    const shop = esc(r.Shop || "-");
    const recordId = esc(r.RecordID || "-");
    const notes = esc(r.Notes || "-");
    const fullName = esc(r.FullName || "-");
    const phone = esc(r.Phone || "-");
    const purchaseDate = esc(r.PurchaseDate || "-");
    const until = esc(r.WarrantyUntil || "-");
    const wText = (r.WarrantyText || "").trim() || "本產品保固條款請依原廠為準。";

    const card = document.createElement("section");
    card.className = "card";

    card.innerHTML = `
      <button class="shot" type="button">截圖</button>

      <div class="card-top">
        <img class="thumb"
          src="${esc(imgUrl)}"
          alt="product"
          crossorigin="anonymous"
          referrerpolicy="no-referrer"
          onerror="this.onerror=null;this.src='${placeholder}';"
        />

        <div class="main">
          <div class="topline">
            <span class="codepill">型號：${model}</span>
            <span class="badge ${badge.cls}">${badge.label}</span>
          </div>

          <div class="brandname">${brand} ${pname}</div>

          <div class="meta"><span>📅 保固到期：</span><b>${until}</b></div>
          <div class="meta"><span>📅 購買日期：</span>${purchaseDate}</div>
          ${serial ? `<div class="meta"><span>🔖 序號：</span>${serial}</div>` : ``}
          <div class="meta"><span>👤 客戶：</span>${fullName} ｜ ${phone}</div>

          <div class="barwrap">
            <div class="barlabel">
              <span>保固剩餘天數</span>
              <b>${badge.daysLeft === null ? "—" : (badge.daysLeft < 0 ? `已過期 ${Math.abs(badge.daysLeft)} 天` : `${badge.daysLeft} 天`)}</b>
            </div>
            <div class="bar ${badge.cls}"><i style="width:${pct}%"></i></div>
            <div class="small" style="margin-top:6px">※ 進度條以 365 天為視覺尺度（方便一眼判讀）</div>
          </div>

          <div class="card-actions">
            <button class="chipbtn primary btnLine" type="button">LINE 客服</button>
            <button class="chipbtn btnCopy" type="button">複製紀錄ID</button>
            <button class="toggle" type="button"><span class="arrow">⌄</span> 保固內容說明</button>
          </div>

          <div class="small" style="margin-top:8px">門市：${shop}　｜　備註：${notes}　｜　紀錄ID：${recordId}</div>
        </div>
      </div>

      <div class="details">${esc(wText)}</div>
    `;

    // 綁事件
    card.querySelector(".btnLine").addEventListener("click", () => window.open(LINE_URL, "_blank", "noopener"));

    const btnCopy = card.querySelector(".btnCopy");
    btnCopy.addEventListener("click", async () => {
      try{
        await navigator.clipboard.writeText(String(r.RecordID || ""));
        btnCopy.textContent = "已複製 ✅";
        setTimeout(()=>btnCopy.textContent="複製紀錄ID", 900);
      }catch(e){
        alert("瀏覽器不允許自動複製，請手動複製紀錄ID：" + String(r.RecordID||""));
      }
    });

    card.querySelector(".toggle").addEventListener("click", () => card.classList.toggle("open"));

    const shotBtn = card.querySelector(".shot");
    shotBtn.addEventListener("click", async () => {
      shotBtn.disabled = true;
      shotBtn.textContent = "截圖中…";
      const safeName = (r.Model || "warranty").toString().replace(/[^\w\-]+/g,"_");
      await downloadCardPng(card, `保固卡_${safeName}.png`);
      shotBtn.disabled = false;
      shotBtn.textContent = "截圖";
    });

    box.appendChild(card);
  });
}

function setLoading(isLoading){
  const btn = document.getElementById("btn");
  btn.disabled = isLoading;
  btn.textContent = isLoading ? "查詢中…" : "查詢";
}

async function queryWarranty(){
  const phone = document.getElementById("phone").value.trim();
  const name  = document.getElementById("fullname").value.trim();
  const serial = document.getElementById("serial").value.trim();

  if(!serial && (phone.length !== 4 || !name)){
    showAlert("請輸入：手機後四碼＋姓名，或直接輸入序號（SerialNo）。");
    return;
  }

  const t = Date.now();
  const url = serial
    ? `${API_URL}?token=${encodeURIComponent(API_TOKEN)}&serial=${encodeURIComponent(serial)}&t=${t}`
    : `${API_URL}?token=${encodeURIComponent(API_TOKEN)}&phoneLast4=${encodeURIComponent(phone)}&fullName=${encodeURIComponent(name)}&t=${t}`;

  setLoading(true);

  try{
    const res = await fetch(url, { cache: "no-store" });
    const data = await res.json();

    document.getElementById("apiHint").textContent = `API 版本：${data.version || "—"}`;

    if(!data || !data.ok){
      showAlert("❌ 查詢失敗，請稍後再試或聯絡客服。");
      return;
    }

    render(Array.isArray(data.rows) ? data.rows : []);
  }catch(e){
    showAlert("❌ 查詢失敗（網路或 API 異常）。請稍後再試或聯絡客服。");
  }finally{
    setLoading(false);
  }
}

document.getElementById("btn").addEventListener("click", queryWarranty);
["phone","fullname","serial"].forEach(id=>{
  document.getElementById(id).addEventListener("keydown", (e) => {
    if(e.key === "Enter") queryWarranty();
  });
});
</script>

</body>
</html>
